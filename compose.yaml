services:
  recall-db:
    image: agnohq/pgvector:18
    container_name: recall-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${DB_USER:-ai}
      POSTGRES_PASSWORD: ${DB_PASS:-ai}
      POSTGRES_DB: ${DB_DATABASE:-ai}
    networks:
      - recall
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ai} -d ${DB_DATABASE:-ai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  recall-api:
    container_name: recall-api
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-recall}:${IMAGE_TAG:-latest}
    command: uvicorn recall.server:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - recall-data:/data
    environment:
      DATA_DIR: /data
      RUNTIME_ENV: dev
      AGNO_DEBUG: "True"
      DB_HOST: recall-db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-ai}
      DB_PASS: ${DB_PASS:-ai}
      DB_DATABASE: ${DB_DATABASE:-ai}
      WAIT_FOR_DB: "True"
      PRINT_ENV_ON_LOAD: "True"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EXA_API_KEY: ${EXA_API_KEY:-}
      MODEL_PROVIDER: ${MODEL_PROVIDER:-openai}
      EMBEDDER_PROVIDER: ${EMBEDDER_PROVIDER:-openai}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
    depends_on:
      recall-db:
        condition: service_healthy
    networks:
      - recall
    extra_hosts:
      - "host.docker.internal:host-gateway"

  recall-web:
    container_name: recall-web
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5174"
    restart: unless-stopped
    ports:
      - "5174:5174"
    volumes:
      - ./web:/app
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - recall-api
    networks:
      - recall

  recall-prometheus:
    container_name: recall-prometheus
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    depends_on:
      - recall-api
    networks:
      - recall

  recall-grafana:
    container_name: recall-grafana
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboard.json:/var/lib/grafana/dashboards/recall.json:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - recall-prometheus
    networks:
      - recall

networks:
  recall:

volumes:
  pgdata:
  recall-data:
  prometheus-data:
  grafana-data:

apiVersion: v1
kind: Secret
metadata:
  name: dash-secrets
  namespace: dash-system
  labels:
    app.kubernetes.io/name: dash
    app.kubernetes.io/component: api
type: Opaque
stringData:
  DB_USER: "dash_user"
  DB_PASS: "CHANGE_ME_IN_PRODUCTION"
  OPENAI_API_KEY: "sk-REPLACE_WITH_ACTUAL_KEY"
---
apiVersion: v1
kind: Secret
metadata:
  name: dash-db-secrets
  namespace: dash-system
  labels:
    app.kubernetes.io/name: dash
    app.kubernetes.io/component: database
type: Opaque
stringData:
  POSTGRES_USER: "dash_user"
  POSTGRES_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  POSTGRES_DB: "dash"

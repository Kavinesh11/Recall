apiVersion: v1
kind: Secret
metadata:
  name: recall-secrets
  namespace: recall-system
  labels:
    app.kubernetes.io/name: recall
    app.kubernetes.io/component: api
type: Opaque
stringData:
  DB_USER: "recall_user"
  DB_PASS: "CHANGE_ME_IN_PRODUCTION"
  OPENAI_API_KEY: "sk-REPLACE_WITH_ACTUAL_KEY"

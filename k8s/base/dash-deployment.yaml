apiVersion: apps/v1
kind: Deployment
metadata:
  name: dash-api
  namespace: dash-system
  labels:
    app.kubernetes.io/name: dash
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: archestra
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: dash
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dash
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: dash-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 61000
        runAsGroup: 61000
        fsGroup: 61000
      containers:
        - name: dash-api
          image: dash:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: dash-config
            - secretRef:
                name: dash-secrets
          env:
            - name: DB_URL
              value: "postgresql://dash_user:pass@dash-db-service:5432/dash"
            - name: ENABLE_AUTH
              value: "true"
            - name: ARCHESTRA_TOKEN_ENDPOINT
              value: "http://archestra-gateway:8080/auth/validate"
            - name: POD_NAME
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dash-api
  namespace: dash-system
  labels:
    app.kubernetes.io/name: dash
    app.kubernetes.io/component: api

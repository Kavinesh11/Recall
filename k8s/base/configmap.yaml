apiVersion: v1
kind: ConfigMap
metadata:
  name: dash-config
  namespace: dash-system
  labels:
    app.kubernetes.io/name: dash
    app.kubernetes.io/component: api
data:
  RUNTIME_ENV: "production"
  DB_HOST: "dash-db-service"
  DB_PORT: "5432"
  DB_DATABASE: "dash"
  PYTHONUNBUFFERED: "1"
  LOG_LEVEL: "INFO"
  MAX_RESULT_ROWS: "1000"
  ENABLE_SECURITY_POLICIES: "true"

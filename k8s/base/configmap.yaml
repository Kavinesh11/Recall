apiVersion: v1
kind: ConfigMap
metadata:
  name: recall-config
  namespace: recall-system
  labels:
    app.kubernetes.io/name: recall
    app.kubernetes.io/component: api
data:
  RUNTIME_ENV: "production"
  DB_HOST: "recall-db-service"
  DB_PORT: "5432"
  DB_DATABASE: "recall"
  PYTHONUNBUFFERED: "1"
  LOG_LEVEL: "INFO"
  MAX_RESULT_ROWS: "1000"
  ENABLE_SECURITY_POLICIES: "true"
  EMBEDDER_PROVIDER: "openai"

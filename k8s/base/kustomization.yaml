apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: recall-system

resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - db-init-configmap.yaml
  - postgres-statefulset.yaml
  - dash-deployment.yaml
  - dash-service.yaml
  - ingress.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/version: "1.0.0"

images:
  - name: recall
    newTag: latest

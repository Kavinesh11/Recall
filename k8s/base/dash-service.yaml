apiVersion: v1
kind: Service
metadata:
  name: recall-api-service
  namespace: recall-system
  labels:
    app.kubernetes.io/name: recall
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: recall
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: recall-api-headless
  namespace: recall-system
  labels:
    app.kubernetes.io/name: recall
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: recall
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8000
      targetPort: http

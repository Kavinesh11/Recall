apiVersion: v1
kind: Service
metadata:
  name: dash-api-service
  namespace: dash-system
  labels:
    app.kubernetes.io/name: dash
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: dash
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: dash-api-headless
  namespace: dash-system
  labels:
    app.kubernetes.io/name: dash
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: dash
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8000
      targetPort: http
